current:
  - number: "LING 224/424"
    title: "Intro to Computational Linguistics"
    description: "Covers foundational concepts in computational linguistics for students with strong linguistic backgrounds. Emphasizes formal languages as analytical tools and teaches algorithm implementation, including finite state phonological and morphological parsing, and syntactic parsing."
    syllabus_slug: "ling-224-424-spring-2026"
    course_notes_url: "http://aaronstevenwhite.io/intro-to-cl/"
  - number: "LING 214/414"
    title: "Statistical Methods in Linguistics"
    description: "Introduction to probability and statistics for linguistics. Topics include elementary probability theory, descriptive and inferential statistics, machine learning concepts, and fixed and mixed effects models. Concepts explored through linguistic case studies including judgment data, reaction times, and acoustic measurements."
    syllabus_slug: "ling-214-414-fall-2025"

previous:
  - number: "LING 281/481"
    title: "Statistical Methods in Computational Linguistics"
    description: "Focuses on deployment of statistical methods for advancing linguistic theory and designing statistical models. Topics include phonetic category perception and learning, phonotactic, morphological, and syntactic grammar induction."
  - number: "LING 282/482"
    title: "Deep Learning Methods in Computational Linguistics"
    description: "Advanced topics emphasizing deployment of deep learning methods for advancing linguistic theory. Covers phonotactic, morphological, and syntactic grammar induction as well as morphological, syntactic and semantic parsing."
  - number: "LING 225/425"
    title: "Intro to Semantic Analysis"
    description: "Introduces analyzing meaning in natural language through formal/logical methods. Employs logical notation to analyze natural language meaning using truth-conditions, set theory, and the relationship between meaning and syntactic/lexical structure."
  - number: "LING 268/468"
    title: "Computational Semantics"
    description: "Hands-on course covering two areas: implementing traditional rule-based compositional semantics in Haskell, and exploring distributional semantic models where meaning derives from lexical co-occurrence in large-scale corpus resources."
  - number: "CSC 247/447"
    title: "Natural Language Processing"
    description: "Introduces NLP with focus on programs that comprehend natural language. Covers English syntax, parsing techniques, semantic analysis, speech acts, knowledge representation, and NLP system design."
