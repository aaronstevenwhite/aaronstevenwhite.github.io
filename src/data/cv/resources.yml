software:
  - name: "Decomp"
    version: "v0.*"
    description: "Toolkit for working with the Universal Decompositional Semantics (UDS) dataset."
    url: "https://github.com/decompositional-semantics-initiative/decomp"
    website: "http://decomp.io/"

datasets:
  # MegaAttitude Project
  - name: "MegaAcceptability"
    version: "v1.0, 2.0"
    description: "Acceptability judgments for syntactic frames of clause-embedding verbs."
    task: "ordinal scale judgments"
    annotation: "acceptability"
    project: "MegaAttitude Project"
    source_corpus: null
    url: "http://megaattitude.io/projects/mega-acceptability/"
    paper: "White & Rawlins 2016"
    paper_url: "https://doi.org/10.3765/salt.v26i0.3819"
    platform: "web"
  - name: "MegaVeridicality"
    version: "v1.0, 2.0"
    description: "Veridicality inferences triggered by clause-embedding verbs."
    task: "ordinal scale judgments"
    annotation: "veridicality"
    project: "MegaAttitude Project"
    source_corpus: null
    url: "http://megaattitude.io/projects/mega-veridicality/"
    paper: "White & Rawlins 2018"
    paper_url: "http://aaronstevenwhite.io/papers/white_role_2018.pdf"
    platform: "web"
  - name: "MegaNegRaising"
    version: "v1.0"
    description: "Neg-raising inference judgments for clause-embedding verbs."
    task: "ordinal scale judgments"
    annotation: "neg-raising"
    project: "MegaAttitude Project"
    source_corpus: null
    url: "http://megaattitude.io/projects/mega-negraising/"
    paper: "An & White 2020"
    paper_url: "https://doi.org/10.7275/yts0-q989"
    platform: "web"
  - name: "MegaOrientation"
    version: "v1.*"
    description: "Temporal interpretation judgments for clause-embedding verbs."
    task: "ordinal scale judgments"
    annotation: "temporal orientation"
    project: "MegaAttitude Project"
    source_corpus: null
    url: "http://megaattitude.io/projects/mega-orientation/"
    paper: "Moon & White 2020"
    paper_url: "https://ling.auf.net/lingbuzz/005282/"
    platform: "web"
  - name: "MegaIntensionality"
    version: "v1.0"
    description: "Belief and desire inference judgments for clause-embedding verbs."
    task: "ordinal scale judgments"
    annotation: "intensionality"
    project: "MegaAttitude Project"
    source_corpus: null
    url: "http://megaattitude.io/projects/mega-intensionality/"
    paper: "Kane et al. 2022"
    paper_url: "https://doi.org/10.3765/salt.v31i0.5137"
    platform: "web"

  # Decompositional Semantics Initiative
  - name: "UDS Semantic Proto-Roles"
    version: "v2.x"
    description: "Proto-role entailment annotations for predicate arguments."
    task: "ordinal scale annotation"
    annotation: "proto-role properties"
    project: "Decompositional Semantics Initiative"
    source_corpus: "English UD v1.2"
    url: "http://decomp.io/projects/semantic-proto-roles/"
    paper: "White et al. 2016"
    paper_url: "https://doi.org/10.18653/v1/D16-1177"
    platform: "web"
  - name: "UDS Factuality"
    version: "v1.0, 2.0"
    description: "Event realis annotations for predicates in context."
    task: "ordinal scale annotation"
    annotation: "factuality"
    project: "Decompositional Semantics Initiative"
    source_corpus: "English UD v1.2"
    url: "http://decomp.io/projects/factuality/"
    paper: "White et al. 2016"
    paper_url: "https://doi.org/10.18653/v1/D16-1177"
    platform: "web"
  - name: "UDS Genericity"
    version: "v1.0"
    description: "Event and entity genericity annotations."
    task: "ordinal scale annotation"
    annotation: "genericity"
    project: "Decompositional Semantics Initiative"
    source_corpus: "English UD v1.2"
    url: "http://decomp.io/projects/genericity/"
    paper: "Govindarajan et al. 2019"
    paper_url: "https://doi.org/10.1162/tacl_a_00285"
    platform: "web"
  - name: "UDS Time"
    version: "v1.0"
    description: "Temporal relation annotations between events."
    task: "ordinal scale annotation"
    annotation: "temporal relations"
    project: "Decompositional Semantics Initiative"
    source_corpus: "English UD v1.2"
    url: "http://decomp.io/projects/time/"
    paper: "Vashishtha et al. 2019"
    paper_url: "https://doi.org/10.18653/v1/P19-1280"
    platform: "web"
  - name: "UDS Event Structure"
    version: "v1.0"
    description: "Event structure property annotations for predicates."
    task: "ordinal scale annotation"
    annotation: "event structure"
    project: "Decompositional Semantics Initiative"
    source_corpus: "English UD v1.2"
    url: "http://decomp.io/projects/event-structure/"
    paper: "Gantt et al. 2022"
    paper_url: "https://doi.org/10.1162/tacl_a_00445"
    platform: "web"

  # STARAMUS
  - name: "SEAMuS"
    version: null
    description: "Cross-document event-keyed summarization dataset."
    task: "summarization"
    annotation: "event-keyed summaries"
    project: "STARAMUS"
    source_corpus: "FAMuS"
    url: "https://staramus.github.io/"
    paper: "Walden et al. 2025"
    paper_url: "https://doi.org/10.48550/arXiv.2410.14795"
    platform: "web"
  - name: "FAMuS"
    version: null
    description: "Cross-document event extraction dataset."
    task: "information extraction"
    annotation: "cross-document event arguments"
    project: "STARAMUS"
    source_corpus: "MegaWika English"
    url: "https://staramus.github.io/"
    paper: "Vashishtha et al. 2024"
    paper_url: "https://doi.org/10.18653/v1/2024.naacl-long.457"
    platform: "web"
  - name: "MegaWika"
    version: null
    description: "30 million Wikipedia passages with scraped and cleaned web citations in 50+ languages."
    task: "text + citation retrieval"
    annotation: "passage-citation pairs"
    project: "STARAMUS"
    source_corpus: "Wikipedia"
    url: "https://huggingface.co/datasets/hltcoe/megawika"
    paper: "Barham et al. 2023"
    paper_url: "https://doi.org/10.48550/arXiv.2307.07049"
    platform: "huggingface"

  # Other
  - name: "Spatial Human Simulation Paradigm"
    version: null
    description: "Human simulation paradigm data investigating distributional and semantic context effects."
    task: "forced choice judgments"
    annotation: "spatial context effects"
    project: null
    source_corpus: null
    url: "https://github.com/aaronstevenwhite/SpatialHumanSimulationExperiments"
    paper: "White et al. 2016"
    paper_url: "http://aaronstevenwhite.io/papers/white_contextual_2016.pdf"
    platform: "github"
  - name: "Implicative Verbs"
    version: null
    description: "Contradiction detection, plausibility, and likelihood judgments for implicative verbs."
    task: "ordinal scale judgments"
    annotation: "implicativity"
    project: null
    source_corpus: null
    url: "https://github.com/aaronstevenwhite/ImplicativeExperiments"
    paper: "White 2016"
    paper_url: "http://aaronstevenwhite.io/papers/white_interaction_2016.pdf"
    platform: "github"
  - name: "Partial Control"
    version: null
    description: "Acceptability judgments investigating partial control constructions."
    task: "ordinal scale judgments"
    annotation: "partial control"
    project: null
    source_corpus: null
    url: "https://github.com/aaronstevenwhite/PartialControlExperiments"
    paper: "White & Grano 2014"
    paper_url: "http://semanticsarchive.net/sub2013/SeparateArticles/White&Grano.pdf"
    platform: "github"
