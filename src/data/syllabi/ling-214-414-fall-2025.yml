policies:
  late_work: "Problem sets: 10% deduction per day (max 3 days). Project components (414 only): No late submissions without prior approval. Extensions require 48-hour advance notice (except emergencies)."
  academic_integrity: "Collaboration on problem sets with classmates is encouraged, but each student must write their own solutions. See the generative AI policy and the University of Rochester's Academic Honesty Policy at http://www.rochester.edu/college/honesty/"
  ai_policy: "Students may use generative AI tools (e.g., ChatGPT, Claude, GitHub Copilot) for coding assistance on problem sets and projects. However, students must fully understand and be able to explain all generated code (assessed during in-class presentations and oral assessments), cite in code comments any AI tools used including the specific prompts, and not use AI tools for written assignments."
  accessibility: "The University of Rochester welcomes students with disabilities. Students seeking accommodations must request them through the Office of Disability Resources: https://www.rochester.edu/disability/"
  exceptions: ""
  title_ix: "All faculty are mandatory reporters for Title IX issues. Students can contact the Title IX Office directly at titleix@rochester.edu or 585-275-1654. More information: www.rochester.edu/sexualmisconduct"
  credit_hour: "This 4-credit course includes 150 minutes per week of direct instruction (two 75-minute sessions) and a minimum of 480 minutes per week of out-of-class student work, including reading assignments, problem sets, data analysis, and project work. This aligns with the University of Rochester's credit hour policy, where each credit hour requires 50 minutes of instruction and 120 minutes of supplementary work. As a cross-listed course, LING414 students are expected to demonstrate advanced content mastery, rigor, and requirements beyond the LING214 level. Graduate students will complete a comprehensive final project that demonstrates independent research capabilities consistent with graduate-level scholarship."
  communication: "All communication must be done through Zulip. Post general questions to appropriate Zulip channels. Use Zulip DMs for grade questions, course absence notifications, etc. Response time: 1-2 business days during work hours. No monitoring after 5 PM or weekends."
  office_hours: "By appointment. Please schedule using the form linked above. I am available to meet if and only if a time is listed as available on the scheduling form."

