course_notes_url: ""
description: "This course provides an introduction to probability and statistics for linguistics, serving as an essential foundation for linguistics students who aim to analyze experimental and corpus linguistic data. The course covers elementary probability theory, descriptive and inferential statistics, fixed and mixed effects models, model evaluation and comparison, analysis of corpus data, analysis of judgment data, analysis of reading time data, and analysis of acoustic measures."
prerequisites:
  - "LING 110 with a grade of C- or better"
credits: 4

learning_objectives:
  - "Master fundamental concepts in probability and statistics"
  - "Apply statistical methods to linguistic data analysis"
  - "Design and analyze linguistic experiments"
  - "Interpret statistical results in linguistics research"
  - "Implement analyses using R programming"
  - "Construct mixed effects models for complex datasets"

materials:
  textbooks:
    - title: "An Introduction to Bayesian Data Analysis for Cognitive Science"
      authors: "Bruno Nicenboim, Daniel Schad, and Shravan Vasishth"
      url: "https://bruno.nicenboim.me/bayescogsci/"
    - title: "Statistics for Linguistics with R: A Practical Introduction"
      authors: "Bodo Winter"
      url: "https://appliedstatisticsforlinguists.org/bwinter_stats_proofs.pdf"
    - title: "Doing Bayesian Data Analysis: A Tutorial with R, JAGS, and Stan"
      authors: "John K. Kruschke"
      url: "https://nyu-cdsc.github.io/learningr/assets/kruschke_bayesian_in_R.pdf"
  software:
    - name: "R"
      description: "Statistical computing language"
      url: "https://www.r-project.org/"
    - name: "RStudio"
      description: "Integrated development environment"
      url: "https://posit.co/download/rstudio-desktop/"
    - name: "Visual Studio Code"
      description: "Integrated development environment"
      url: "https://code.visualstudio.com/"
  readings:
    - title: "Zipf's Word Frequency Law"
      authors: "Piantadosi (2014)"
      url: "https://doi.org/10.3758/s13423-014-0585-6"
    - title: "Poisson Mixtures"
      authors: "Church & Gale (1995)"
      url: "https://www.aclweb.org/anthology/J95-2008/"
    - title: "Latent Dirichlet Allocation"
      authors: "Blei, Ng, & Jordan (2003)"
      url: "https://www.jmlr.org/papers/v3/blei03a.html"
    - title: "The influence of categories on perception"
      authors: "Feldman, Griffiths, & Morgan (2009)"
      url: "https://pubmed.ncbi.nlm.nih.gov/19839683/"

