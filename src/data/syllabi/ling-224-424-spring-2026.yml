  textbooks: []
  software:
    - name: "Python"
      description: "Programming language"
      url: "https://www.python.org/downloads/"
    - name: "Jupyter"
      description: "Interactive notebook environment"
      url: "https://jupyter.org/"
    - name: "Anaconda"
      description: "Python distribution for data science"
      url: "https://www.anaconda.com/distribution/"
    - name: "Google Colab"
      description: "Cloud-based Jupyter notebook environment"
      url: "https://colab.research.google.com/notebooks/welcome.ipynb"
  readings:
    - title: "Course notes"
      authors: ""
      url: "http://aaronstevenwhite.io/intro-to-cl/"
      notes: "There are two kinds of readings in this course: (i) the course notes and (ii) primary and secondary sources. For each module, I will specify the primary and secondary sources you should read for that module at the beginning of the course notes for that module. I expect you to read both before the lecture they are associated with and will assume that you have."

assessment:
  tracks:
    - track: "LING 224"
      components:
        - name: "Weekly Assignments"
          weight: 80
          details: "Homework assignments distributed as Jupyter notebooks, consisting of programming tasks in Python and short response questions"
        - name: "Participation"
          weight: 20
          details: "Based half on recitation attendance and half on attending office hours at least twice by Thursday, Mar. 5"
    - track: "LING 424"
      components:
        - name: "Weekly Assignments"
          weight: 70
          details: "Homework assignments distributed as Jupyter notebooks, consisting of programming tasks in Python and short response questions"
        - name: "Project"
          weight: 30
          details: "Implement an agenda-based multiple context free grammar (MCFG) parser, packaged using standard Python packaging conventions with a full suite of unit tests using a unit testing framework (preferably pytest). Due Tuesday, May 5."
  homework_notes:
    - "Homeworks will be assigned weekly throughout the semester."
    - "They will generally consist of a mix of programming tasks in Python and short response questions distributed as a Jupyter notebook."
    - "The homework problems for a particular week will be discussed in the workshop, and so they must be turned in via Blackboard before the start of the workshop (even for students taking LING424)."
    - "Grading focuses on reasonable effort over correctness: (i) you have made some demonstrable progress on completing that task; and (ii) if you are unable to complete a task, you must provide a very detailed description of where you are getting stuck with reference to your code."
    - "A major component of each homework assignment is unit testing. Fully half of the grade for each programming task is based on the unit tests you write. These tests do not need to be written in a unit testing framework (e.g. pytest), but they must check for the correctness of a piece of code and raise an exception if that piece of code does not function in the expected way. They must not simply print results that you check manually."
    - "You can write unit tests before you write the code they test. In fact, you should be writing unit tests before you write the code they test. These tests are easy credit."
  workshop_notes: "This course has an associated workshop led by Helena Feng. For students taking LING224, attendance at the workshop is mandatory and part of the overall course grade."
  exams: "There are no exams in this course."
  extra_credit: "You can earn 2% extra credit by attending both of the following linguistics colloquia: Jane Chandlee (Haverford College) on Friday, Apr. 3, 2-3:30pm in Bausch and Lomb 106; and Aniello De Santo (University of Utah) on Friday, Apr. 24, 2-3:30pm in Dewey 1101 Auditorium. You must attend both to get the extra credit. Attending one is not sufficient. An additional 3% extra credit is available for students who ask a question during the question period after both talks. Both the base 2% and the additional 3% are all or nothing."
  grading_scale:
    notes: "All grades are curved to account for task and assignment difficulty. This curving is implemented in a way that guarantees students receive a grade that is at least as good as (and generally better than) the grade they would receive using a standard 3-4% grading band system -- i.e. 97-100% maps to A+ (for LING224 only), 93-97% maps to A, 90-93% maps to A-, 87-90% maps to B+, etc."

policies:
  late_work: "Homeworks should be submitted before the workshop each week -- i.e. by the start of the recitation (9am on Fridays). Because homeworks are discussed in workshop, no late work will be accepted unless I have given you an extension prior to the deadline. You must ask for an extension at least 48 hours before the deadline, unless you are asking because it is an emergency."
  academic_integrity: "All assignments and activities associated with this course must be performed in accordance with the University of Rochester's Academic Honesty Policy. More information is available at: http://www.rochester.edu/college/honesty/"
  ai_policy: ""
  accessibility: "Any student who needs special accommodations due to a disability should let me know privately, at the start of the semester."
  exceptions: "Students will not be penalized because of important civic, ethnic, family or religious obligations, or university service. You will have a chance, whenever feasible, to make up within a reasonable time any assignment that is missed for these reasons. Absences for these reasons will count as excused for the sake of the participation grade. But it is your job to inform me of any expected absences in advance, as soon as possible."
  credit_hour: "This course follows the College credit hour policy for four-credit courses, which stipulates that students are expected to complete a 'fourth period' in addition to the course instructional time of two class periods per week. In this course, students will use this 'fourth period' for enriched independent study using readings and other class materials, including those associated with the course project."

