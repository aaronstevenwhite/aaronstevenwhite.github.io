course_notes_url: "http://aaronstevenwhite.io/intro-to-cl/"
description: "This course covers foundational concepts in computational linguistics. Major focus is placed on the use of formal languages as a tool for understanding natural language as well as on developing students' ability to implement foundational algorithms pertaining to those formal languages. Topics include basic formal language theory, finite state phonological and morphological parsing, and syntactic parsing for context free grammars and mildly context sensitive formalisms."
prerequisites:
  - "LIN110 (Introduction to Linguistic Analysis)"
  - "CSC161 (Introduction To Programming) or equivalent"
credits: 4

learning_objectives: []

